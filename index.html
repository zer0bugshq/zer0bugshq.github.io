<!DOCTYPE html>

<head>

  <title>BugHunter Tracker — Bug Bounty Dashboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Chart.js -->

  <!-- App styles -->
  <link rel="stylesheet" href="css/style.css" />

      <div style="text-align:center;">
        <svg width="40" height="40" viewBox="0 0 100 100" style="margin-bottom:12px;display:block;margin-left:auto;margin-right:auto;">
          <rect width="100" height="100" rx="20" fill="#1a1f2e"/>
          <path d="M50 10 L80 22 L80 52 C80 68 65 82 50 90 C35 82 20 68 20 52 L20 22 Z" fill="#f78166" opacity="0.9"/>
          <text y=".72em" font-size="44" x="26">🐛</text>

        Loading BugHunter Tracker…
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => App.boot());
  </script>
